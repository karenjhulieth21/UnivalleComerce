version: '3.8'
services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  usuarios-service:
    build: .
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/usuarios_db
    depends_on:
      - mongodb

volumes:
  mongo_data: